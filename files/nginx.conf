user www-data;
worker_processes auto;
worker_cpu_affinity auto;

# Allow workers 30 seconds to shut down gracefully, then close the connections
# to allow for predictable shutdown/restart times.
worker_shutdown_timeout 30s;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    server_tokens off;
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10M;
    proxy_read_timeout 1800s; # increased due to dryrun performance tests

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # Prevent DoS attacks
    reset_timedout_connection on;

    log_format syslog '$http_host '
                      '$remote_addr '
                      '"$http_x_forwarded_for" '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '$request_time '
                      '$upstream_response_time';

    access_log /var/log/nginx/access.log syslog;

    # Don't ever retry failed requests. In spite of the name, this
    # prevents retries even if there's only a single upstream.
    proxy_next_upstream off;
}

